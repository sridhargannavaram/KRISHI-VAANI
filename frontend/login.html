<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | KRISHI VAANI</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="glass">
        <a href="index.html" class="logo">
            <i class="fas fa-leaf"></i> KRISHI VAANI
        </a>
        <div class="nav-links">
            <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
            <a href="register.html" class="btn btn-primary">Sign Up</a>
        </div>
    </nav>

    <div class="container flex-center">
        <div class="glass glass-card" style="width: 100%; max-width: 400px;">
            <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" class="form-control" placeholder="+919876543210" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div id="loginError" style="color: #ff6b6b; margin-bottom: 1rem; display: none; text-align: center; font-size: 0.9rem;"></div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.9rem;">
                Don't have an account? <a href="register.html" style="color: var(--accent-color); text-decoration: none;">Sign up here</a>
            </p>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password })
                });

                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('farmer', JSON.stringify(data.farmer));
                    window.location.href = 'dashboard.html';
                } else {
                    errorDiv.textContent = data.error || 'Login failed';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Server error. Please try again later.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
